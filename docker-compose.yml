
version: '3.9'
services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --sql_mode=""
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: alerts
      MYSQL_USER: app
      MYSQL_PASSWORD: app123
    ports: ["3306:3306"]
    volumes:
      - dbdata:/var/lib/mysql
      - ./infra/sql/schema_mysql.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./infra/sql/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql

  api:
    build: ./backend
    env_file: ./infra/env.example
    environment:
      DATABASE_URL: mysql+pymysql://app:app123@db:3306/alerts
      API_ENV: dev
    depends_on: [db]
    ports: ["8000:8000"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  dbdata:
